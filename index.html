<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anime Wallpapers</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#0f172a,#1e1b4b);
color:white;
}

header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
padding:15px;
}

.card{
position:relative;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{transform:scale(1.05);}

.card img{
width:100%;
display:block;
border-radius:15px;
}

.actions{
position:absolute;
bottom:8px;
left:8px;
right:8px;
display:flex;
justify-content:space-between;
}

.btn{
border:none;
padding:5px 8px;
border-radius:6px;
font-size:12px;
cursor:pointer;
text-decoration:none;
}

.like{background:#ff2d55;color:white;}
.download{background:#00c2ff;color:white;}

.badge{
position:absolute;
top:6px;
right:6px;
background:rgba(0,0,0,0.6);
padding:3px 6px;
border-radius:8px;
font-size:12px;
}
</style>
</head>

<body>

<header>🌸 Anime Wallpapers</header>

<div class="gallery" id="gallery"></div>

<script>
const images = [
  "https://i.ibb.co/1.jpg",
  "https://i.ibb.co/2.jpg",
  "https://i.ibb.co/3.jpg"
];

function load(){
let g=document.getElementById("gallery");
g.innerHTML="";

images.forEach((img,i)=>{

let key="like_"+i;
let likes=localStorage.getItem(key)||0;

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${img}">

<div class="badge">❤️ <span id="l${i}">${likes}</span></div>

<div class="actions">
<button class="btn like" onclick="like(${i})">❤️ Like</button>
<a class="btn download" href="${img}" download>📥</a>
</div>
`;

g.appendChild(div);
});
}

function like(i){
let key="like_"+i;
let val=parseInt(localStorage.getItem(key)||0)+1;
localStorage.setItem(key,val);
document.getElementById("l"+i).innerText=val;
}

load();
</script>

</body>
</html>
